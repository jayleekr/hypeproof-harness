version: 2

# Machine-readable automation-identity + permission model for M004 WS1.
# Encodes the target separation between Jay's human owner identity and the
# delegated automation worker, hardened against the adversarially-verified
# boundary failures A6 and A7 (boundary-verifier, 2026-07-22).
#
# M005 validation (2026-07-22): the Phase 2 permission model below was
# re-evaluated against GitHub App and classic PAT and re-confirmed as the
# minimal viable option (fine-grained PAT on a machine user) — the deciding
# constraint is launchd/cron compatibility with the existing static 0600
# env-file token model. See docs/M005-IDENTITY-ISOLATION.md and the
# scripts/identity-isolation/ package. Layer-2 uid isolation is now specified
# concretely (uid_isolation_m005 below). NOT redesigned — validated + extended.
#
# A6 (meta-boundary): the data plane IS server-enforced — enforce_admins:true
#   makes GitHub itself reject admin --admin merge, main push, force-push,
#   delete, and self-merge across gh / raw-git / REST. BUT the same principal
#   that holds Administration:write can `PUT enforce_admins:false` (no-op PUT
#   returns 200), push, then restore. So protection is only as strong as the
#   WEAKEST holder of Administration:write. Automation must therefore never hold
#   Administration:write.
# A7 (transport asymmetry): withholding the fine-grained "Workflows" permission
#   makes an https/token `contents` PUT of a .github/workflows/** file 404 —
#   BUT a raw git SSH push is not scope-limited and succeeds on a non-protected
#   branch. Token-scope protection of workflow files therefore only holds on the
#   https path. Automation must use https + fine-grained PAT (not an SSH deploy
#   key) so the Workflows-scope denial is real, AND workflow files must ALSO be
#   protected server-side (required check + CODEOWNERS) to cover any SSH path.

# ---------------------------------------------------------------------------
# MEASURED current state (the thing being replaced), 2026-07-22
# ---------------------------------------------------------------------------
current_principal:
  identity: jayleekr            # human OWNER token is what automation uses today
  measured_by: "gh auth status; git log; cron-prompts/cron-env.sh:9"
  gh_token_type: oauth          # gho_...
  gh_token_scopes: [repo, admin:public_key, delete_repo, gist, read:org]
  # M005 re-measured 2026-07-22 (phase3-00-preflight.sh): scope set unchanged.
  git_transport:                # per-repo, re-measured 2026-07-22 (was: "ssh")
    ssh:   [hypeproof-harness, hypeproof-studio, sediment]   # git@github.com:...
    https: [hypeprooflab]                                    # osxkeychain (Jay acct 25076199)
  ssh_key_passphrase: none      # audited: passphrase-less key on disk (~/.ssh/id_ed25519, 0600)
  cred_store_perms:             # M005 measured 2026-07-22 — perms only, no values
    "~/.ssh/id_ed25519": "0600 jaylee"
    "~/.config/cron/env": "0600 jaylee"          # Claude Code OAuth token (set -a source)
    "~/.config/gh/hosts.yml": "0600 jaylee"
    "~/.gitconfig": "0644 jaylee"                # WORLD-READABLE — tightened to 0600 in M005 Phase 3 Step 20
  can_modify_branch_protection: true   # A6 — owner/admin principal
  unnecessary_for_autonomy: [delete_repo, admin:public_key]   # never needed by a worker
  runs_as_uid: jaylee           # ROOT CONSTRAINT — see uid_isolation below

# ---------------------------------------------------------------------------
# TARGET automation identity
# ---------------------------------------------------------------------------
target_identity:
  login: hypeproof-automation   # dedicated machine user (WS1 recommendation)
  credential:
    type: fine-grained-pat      # NOT an SSH deploy key (A7): keeps Workflows-scope denial effective
    transport: https
    max_lifetime_days: 365
    resource_owner: hypeproof-automation
    repositories:               # least-privilege: only repos the worker writes to
      write:
        - jayleekr/hypeprooflab      # cron issue-solver / issue-filer / content PRs
      read:
        - jayleekr/hypeproof-harness # governance audit reads policy + protection
        - jayleekr/hypeproof-studio
        - jayleekr/sediment

  # Fine-grained permission grants. Anything not listed = NOT GRANTED.
  permissions:
    grant:
      Metadata: read            # mandatory baseline
      Contents: write           # create branch, push feature branch
      Pull requests: write      # open PR, comment
      Issues: write             # file/triage issues (cron issue-filer)
      Administration: read      # A6: observe branch protection for briefs, CANNOT modify
      Actions: read             # read CI results
      Checks: read
    deny:                       # explicit MUST-NOT — each maps to a verified breakout
      Administration: write     # A6 breakout: could disable enforce_admins, push, restore
      Secrets: write            # could swap CI secrets / exfil path
      Environments: write
      Workflows: write          # A7: blocks .github/workflows/** edits ON THE HTTPS PATH
      # Actions: write (workflow_dispatch) — grant ONLY per-job if a trigger is
      # actually required; withheld by default.

# ---------------------------------------------------------------------------
# Capability matrix (Mission 2) — least privilege per action
# ---------------------------------------------------------------------------
actions:
  read_repository:        { permission: "Contents:read/Metadata:read", automation: allow }
  create_branch:          { permission: "Contents:write",              automation: allow }
  push_feature_branch:    { permission: "Contents:write",              automation: allow }
  open_pr:                { permission: "Pull requests:write",         automation: allow }
  comment:                { permission: "Pull requests:write",         automation: allow }
  read_ci:                { permission: "Actions:read + Checks:read",  automation: allow }
  trigger_workflow:       { permission: "Actions:write",               automation: conditional, note: "grant only if a job needs workflow_dispatch" }
  merge:                  { permission: "Contents:write + protection reviews", automation: deny, enforced_by: branch_protection }
  modify_rulesets:        { permission: "Administration:write",        automation: deny, breakout: A6 }
  modify_branch_protection: { permission: "Administration:write",      automation: deny, breakout: A6 }
  modify_secrets:         { permission: "Secrets:write",               automation: deny }
  modify_workflow_files:  { permission: "Workflows:write (https) / SSH bypasses", automation: deny, enforced_by: "token-scope(https) + CODEOWNERS + required check(any transport)", breakout: A7 }
  modify_own_credentials: { permission: "-",                           automation: deny }
  merge_control_plane_pr: { permission: "-",                           automation: deny, enforced_by: "control-plane-gate + CODEOWNERS maintainers-only" }

# ---------------------------------------------------------------------------
# Two-layer model — narrowing the identity is necessary but NOT sufficient
# ---------------------------------------------------------------------------
defense_layers:
  layer_1_narrow_identity:
    status: preparable_now
    what: "Create hypeproof-automation + fine-grained PAT with the grants above; switch cron to https+PAT; stop using Jay's owner token/ssh for automation."
    closes: "A6 (no Administration:write) and A7-https (no Workflows scope)."
    human_gate: [create_machine_user, create_pat, add_collaborator_write, store_token_for_launchd]

  layer_2_uid_isolation:
    status: infra_change_human_gate
    what: "Run automation sessions under a separate OS user / sandbox so Jay's ~/.gitconfig, keychain, and ssh keys are NOT readable by the session."
    why: "ROOT CONSTRAINT — while the session runs as uid `jaylee`, narrowing the token is reversible: the session can still read the owner's ssh key / keychain and re-acquire owner rights. Layer 1 alone is bypassable without this."
    human_gate: [separate_os_user_or_sandbox, filesystem_perms_on_owner_creds]
    realized_by: uid_isolation_m005   # see below — concrete cutover package (M005 Phase 3/4)

# ---------------------------------------------------------------------------
# M005 realization of Layer 2 — concrete uid isolation (scripts + verification)
# NOTE: OS account (hypeproof-agent) != GitHub login (hypeproof-automation).
# ---------------------------------------------------------------------------
uid_isolation_m005:
  os_account:
    login: hypeproof-agent          # dedicated macOS user; uid auto-assigned (501-503 taken)
    kind: standard_non_admin        # NOT in admin group -> cannot sudo
    hidden: true                    # IsHidden + HiddenUsersList (service account)
    home: /Users/hypeproof-agent    # 0700; runtime checkouts under /Users/hypeproof-agent/runtime
  agent_credentials:                # provisioned INSIDE agent home, nothing inherited from Jay
    github_pat: "$AGENT_HOME/.config/git/credentials (0600) OR agent gh keyring — machine user PAT"
    claude_token: "$AGENT_HOME/.config/cron/env (0600) — agent's OWN CLAUDE_CODE_OAUTH_TOKEN"
  launchd:
    mechanism: LaunchDaemon         # /Library/LaunchDaemons + <UserName>hypeproof-agent
    why_not_launchagent: "user LaunchAgents only run in that user's GUI login session; a hidden service account is never logged in. Daemon runs at boot and drops privilege to the agent uid. (macOS behavior, HIGH confidence.)"
    source_jobs: "~jaylee/Library/LaunchAgents/com.hypeproof.cron.*.plist (12 jobs, measured 2026-07-22)"
  keychain_isolation: "free from uid split — ~jaylee/Library/Keychains/*.keychain-db is per-uid + locked; agent uid cannot use it. Verified by Phase 4 A2."
  scripts: scripts/identity-isolation/          # emit-only; --apply refused; no secret values
  runbook: docs/M005-IDENTITY-ISOLATION.md
  noninheritance_contract:                        # asserted by phase4-noninheritance-suite.sh
    must_fail_from_agent:                         # each maps to an expected server/OS response
      read_jay_ssh_key: EACCES
      use_jay_keychain_cred: not_found
      gh_as_jayleekr: "identity != jayleekr"
      repo_admin_write: 403
      branch_protection_mutation: 403             # 404 only if authz'd but branch missing
      repo_deletion: "403/404"
      ssh_key_admin: "403/404"
    must_pass_from_agent:
      clone_authorized_repo: success
      feature_branch_create_push: success
      read_ci_status: 200
      read_branch_protection_observe_only: 200
      comment_owned_pr: success

# ---------------------------------------------------------------------------
# Exact human-run procedure for LAYER 1 (settings/credentials NOT changed here)
# ---------------------------------------------------------------------------
layer_1_procedure:
  - step: "1. Create machine user hypeproof-automation (new GitHub account, separate email). Cost 0."
  - step: "2. Add it as collaborator with WRITE (not admin) on jayleekr/hypeprooflab."
    cmd: "gh api -X PUT repos/jayleekr/hypeprooflab/collaborators/hypeproof-automation -f permission=push"
  - step: |
      3. As hypeproof-automation, create a fine-grained PAT at
      https://github.com/settings/personal-access-tokens/new
      resource owner = hypeproof-automation; selected repos = hypeprooflab (+ read on others);
      permissions = Contents RW, Pull-requests RW, Issues RW, Metadata R, Administration R, Actions R, Checks R.
      DO NOT grant Administration write, Secrets, Environments, or Workflows.
  - step: |
      4. Store as GH_TOKEN for the launchd jobs (keychain or chmod 600 env file sourced by
      cron-env.sh); set the git remote to https so the PAT (not the ssh key) is used.
  - step: "5. Verify least privilege — both of these MUST fail for the new token:"
    verify_deny:
      - "gh api -X PUT repos/jayleekr/hypeprooflab/branches/main/protection ...   -> expect 403 (Administration read-only)"
      - "gh api -X PUT repos/jayleekr/hypeprooflab/contents/.github/workflows/x.yml ...   -> expect 404 (no Workflows scope)"
