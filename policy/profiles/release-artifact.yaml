version: 1
profile: release-artifact

repository:
  allow_forking: true
  delete_branch_on_merge: true
  allow_auto_merge: false
  merge_methods:
    squash: true
    merge_commit: false
    rebase: false
  features:
    issues: false
    wiki: false
    projects: false

labels:
  human-needed:
    color: fbca04
    description: 사람 직접 리뷰/처리가 필요한 PR 또는 이슈

collaborators:
  manage: admins
  admin_permission: write

security:
  dependabot_security_updates: enabled
  secret_scanning: enabled
  secret_scanning_push_protection: enabled
  secret_scanning_non_provider_patterns: disabled

actions:
  enabled: false
  default_workflow_permissions: read
  can_approve_pull_request_reviews: false

review_request:
  active_members: all
  exclude_author: true

deployment:
  production_authority: source_repo_release_workflow
  provider_git_auto_deploy: disabled
  preview_deploys: disabled
  manual_cli_deploy: prohibited

branch_protection:
  branch: main
  enforce_admins: true
  allow_force_pushes: false
  allow_deletions: false
  required_linear_history: false
  required_pull_request_reviews:
    required_approving_review_count: 0
    dismiss_stale_reviews: false
    require_code_owner_reviews: false
    require_last_push_approval: false
