version: 1

repositories:
  - owner: jayleekr
    name: hypeproof-harness
    visibility: public
    profile: harness-core
    lifecycle: governance
    default_branch: main
    products: [governance]
    required_status_checks:
      - lint (bash -n + path hygiene)
      - gate (tests/run.sh against mock consumers)
      - "pr-policy (branch name + Closes #)"
      - repo-governance (policy validation)

  - owner: jayleekr
    name: hypeproof-studio
    visibility: public
    profile: public-product
    lifecycle: product
    default_branch: main
    products: [studio]
    required_status_checks:
      - repo-governance (repo files)
      - worker / test
      - worker / typecheck
      - extension / typecheck
    required_secrets:
      actions:
        - ANTHROPIC_API_KEY
        - DISCORD_WEBHOOK_HYPEPROOF_STUDIO
        - DISCORD_WEBHOOK_SEDIMENT
    release_repos:
      - jayleekr/hypeproof-studio-releases

  - owner: jayleekr
    name: sediment
    visibility: public
    profile: public-product
    lifecycle: product
    default_branch: main
    products: [sediment]
    required_status_checks:
      - repo-governance (repo files)
      - Rust CLI unit + edges
      - Backend + shim + rate-limit UT
      - Cross-tenant RLS gate (blocks merge)
      - Lint :NAME::TYPE SQL cast
      - Scan PR diff for secrets / credentials / private keys
      - Python smoke tests (JWT, fixer 4-tier, search_utils, chunker, ...)
    required_secrets:
      actions:
        - FLY_API_TOKEN
        - VERCEL_TOKEN
        - VERCEL_ORG_ID
        - VERCEL_PROJECT_ID
        - DISCORD_WEBHOOK_SEDIMENT
        - RELEASE_MIRROR_TOKEN
    release_repos:
      - jayleekr/sediment-cli-releases
      - jayleekr/homebrew-sediment

  - owner: jayleekr
    name: hypeprooflab
    visibility: private
    target_visibility: public
    profile: content-vault
    lifecycle: product
    default_branch: main
    products: [lab, vault]
    deployment:
      production_authority: github-actions
      workflow: .github/workflows/ci.yml
      job: deploy
      provider: vercel
      provider_git_auto_deploy: disabled
      provider_config: vercel.json
    public_readiness:
      blocked_by:
        - issue: jayleekr/hypeprooflab#96
          reason: Rotate/revoke the exposed Google OAuth client secret and verify the historical commit is no longer fetchable by SHA.
        - issue: jayleekr/hypeprooflab#100
          reason: Complete tracked text/PDF/image PII sweep before making the content repo public again.
      verifier:
        pr: jayleekr/hypeprooflab#120
        workflow: OAuth purge verification
    required_status_checks:
      - repo-governance (repo files)
      - CI & Deploy / build
      - Verify Members in Build / verify
    required_secrets:
      actions:
        - VERCEL_TOKEN
        - SEDIMENT_INGEST_URL
        - SEDIMENT_WEBHOOK_SECRET
        - DISCORD_WEBHOOK_HYPEPROOFLAB_PAGE
        - DISCORD_WEBHOOK_SEDIMENT
    exceptions:
      - id: lab-public-readiness-oauth-history-purge
        owner: jayleekr
        reason: Keep private until hypeprooflab#96 confirms Google OAuth secret rotation and GitHub historical commit purge.
        expires_at: 2026-12-31
      - id: lab-public-readiness-pii-sweep
        owner: jayleekr
        reason: Keep private until hypeprooflab#100 confirms current-tree PII/email cleanup.
        expires_at: 2026-12-31
      - id: temporary-private-until-oauth-purge
        owner: jayleekr
        reason: Target visibility is public, but the repo must remain private until the exposed OAuth credential is rotated and the historical commit purge verifier passes.
        expires_at: 2026-08-31
      - id: private-branch-protection-plan-limit
        owner: jayleekr
        reason: Personal private repo branch protection requires GitHub Pro/Team or Organization before hard enforcement.
        expires_at: 2026-12-31
      - id: private-forking-api-limit
        owner: jayleekr
        reason: GitHub only exposes allow_forking mutation for org-owned private repositories.
        expires_at: 2026-12-31
      - id: private-secret-scanning-api-limit
        owner: jayleekr
        reason: Personal private repo security_and_analysis API is unavailable until GitHub Pro/Team or org migration.
        expires_at: 2026-12-31
  - owner: jayleekr
    name: jayleekr.github.io
    visibility: public
    profile: public-site
    lifecycle: site
    default_branch: master
    protected_branch: master
    products: [personal-site]
    required_status_checks: []
    exceptions:
      - id: github-io-ci-not-yet-created
        owner: jayleekr
        reason: Add stable PR checks before requiring named status contexts.
        expires_at: 2026-08-31

  - owner: jayleekr
    name: hypeproof-studio-releases
    visibility: public
    profile: release-artifact
    lifecycle: release
    default_branch: main
    products: [studio]
    source_repo: jayleekr/hypeproof-studio

  - owner: jayleekr
    name: sediment-cli-releases
    visibility: public
    profile: release-artifact
    lifecycle: release
    default_branch: main
    products: [sediment]
    source_repo: jayleekr/sediment

  - owner: jayleekr
    name: homebrew-sediment
    visibility: public
    profile: release-artifact
    lifecycle: release
    default_branch: main
    products: [sediment]
    source_repo: jayleekr/sediment
