name: "UX suggestion"
description: "Improve an existing interaction in the Studio UI"
title: "[ux] "
labels: ["type:ux"]
body:
  - type: markdown
    attributes:
      value: |
        Best filed via the `/report-ui` skill (auto-fills environment + screenshot).
        See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md). This form is the manual fallback.
  - type: input
    id: surface
    attributes:
      label: Which UI surface?
      placeholder: "chat panel / coach naming / suggestion chips / welcome / approve modal"
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: What happens now
      description: The current behaviour that feels off.
    validations:
      required: true
  - type: textarea
    id: better
    attributes:
      label: What would be better
      description: The change you suggest, and why it helps the learner.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Auto-filled by /report-ui. Manual: run `bash scripts/collect-studio-env.sh` and paste."
      render: json
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Screenshot / evidence
      description: Drag an image here, or leave the marker the skill inserted.
