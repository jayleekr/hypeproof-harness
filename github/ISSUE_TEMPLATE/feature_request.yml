name: "Feature proposal"
description: "Propose a new capability for HypeProof Studio"
title: "[feature] "
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        Best filed via the `/report-ui` skill (auto-fills environment + screenshot).
        See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md). This form is the manual fallback.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the learner/contributor pain. Not the solution yet.
      placeholder: "While using the coach panel, a learner cannot ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed capability
      description: What should the Studio do? Keep it concrete.
    validations:
      required: true
  - type: dropdown
    id: essence
    attributes:
      label: Which of the 16 Essences does this serve?
      description: A feature that serves none is probably noise (see docs/essence-v0.1.md).
      multiple: true
      options:
        - "Not sure / needs discussion"
        - "1–4 (intent / framing)"
        - "5–8 (iteration / articulation)"
        - "9–12 (judgement / verification)"
        - "13–16 (reflection / transfer)"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Auto-filled by /report-ui. Manual: run `bash scripts/collect-studio-env.sh` and paste."
      render: json
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Screenshot / evidence
      description: Drag an image here, or leave the marker the skill inserted.
