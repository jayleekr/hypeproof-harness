name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: lint (bash -n + path hygiene)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: bash -n
        run: |
          set -e
          bash -n scripts/sync.sh
          bash -n scripts/security/check-secrets.sh
          bash -n scripts/register-skills.sh
          bash -n tests/run.sh

      - name: shellcheck (warnings only, non-blocking)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck -S warning scripts/sync.sh scripts/security/check-secrets.sh scripts/register-skills.sh tests/run.sh || true

      - name: Secret scan changed files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -e
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            bash scripts/security/check-secrets.sh --working-tree
          else
            bash scripts/security/check-secrets.sh --diff "$BASE_SHA"
          fi

      - name: skill registration generated & committed
        run: |
          # Harness-local invariant: every skills/<name>/ has a committed
          # .claude/skills/<name> symlink. Fails the PR if a skill was added
          # without registering it (the gap that shipped hype-review in #28).
          bash scripts/register-skills.sh --check

      - name: No hardcoded user-specific paths
        run: |
          set -e
          # Catch ~/CodeWorkspace, ~/code, ~/dev, ~/projects in maintainer scripts.
          # consumers.txt is allowed to mention them inside comments (not active lines).
          if grep -rnE '(^|[^_])~/(CodeWorkspace|code|dev|projects)/' scripts/ 2>/dev/null; then
            echo "Hardcoded user-specific path found in scripts/ — use \${HYPEPROOF_WORKSPACE} or CONSUMER_<repo>" >&2
            exit 1
          fi
          # Active (non-comment) lines in consumers.txt must not hardcode user paths.
          if grep -vE '^\s*(#|$)' tests/consumers.txt | grep -nE '~/(CodeWorkspace|code|dev|projects)/' ; then
            echo "Active line in tests/consumers.txt hardcodes a user-specific path" >&2
            exit 1
          fi

  pr-policy:
    name: "pr-policy (branch name + Closes #)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ ! "$BRANCH" =~ ^(fix|feat|docs|chore)/ ]]; then
            echo "Branch '$BRANCH' must start with fix/, feat/, docs/, or chore/" >&2
            echo "See MEMBER-GUIDE.ko.md §4.2" >&2
            exit 1
          fi

      - name: "Closes # in body"
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          if ! printf '%s' "$BODY" | grep -qE '(Closes|Fixes|Resolves) #[0-9]+'; then
            echo "PR body must include 'Closes #<n>', 'Fixes #<n>', or 'Resolves #<n>'" >&2
            echo "See MEMBER-GUIDE.ko.md §4.4" >&2
            exit 1
          fi

  gate:
    name: gate (tests/run.sh against mock consumers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up mock consumer repos
        run: |
          set -e
          mkdir -p /tmp/ws/hypeproof-studio /tmp/ws/sediment /tmp/ws/hypeprooflab
          for d in /tmp/ws/*/; do
            cd "$d"
            git init -q -b main
            git -c user.email=ci@example.com -c user.name=CI commit --allow-empty -q -m init
            cd - >/dev/null
          done

      - name: Vendor harness → mock consumers
        env:
          HYPEPROOF_WORKSPACE: /tmp/ws
        run: bash scripts/sync.sh

      - name: Run vendor gate
        env:
          HYPEPROOF_WORKSPACE: /tmp/ws
        run: bash tests/run.sh

  repo-governance:
    name: repo-governance (policy validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install policy test deps
        run: python -m pip install --quiet pyyaml pytest
      - name: Validate policy offline
        run: python scripts/repo-governance/audit.py --offline
      - name: Run Python tests
        run: python -m pytest tests/repo_governance tests/skill_creator tests/hype_review tests/hype_pr tests/hype_merge tests/security tests/weekly_loop

      # The weekly-loop gate cannot be enforced against live issues at PR time —
      # a PR contains no issues. What IS enforced here is the gate itself: every
      # PR replays a committed adversarial corpus and must reproduce the exact
      # injected-vs-detected counts, so a change that quietly reopens a bypass
      # (or that examines nothing) cannot merge. See tests/weekly_loop/fixtures/.
      - name: weekly-loop gate — adversarial corpus (non-vacuity proof)
        env:
          CI: "true"
          CORPUS: tests/weekly_loop/fixtures/evidence_corpus.json
        run: |
          set +e
          python scripts/weekly-harness/check.py \
            --cycle weekly-2026-07-27 \
            --repo jayleekr/hypeproof-corpus \
            --issues-json "$CORPUS" --json > corpus-report.json
          rc=$?
          set -e
          if [ "$rc" != "1" ]; then
            echo "expected exit 1 (the corpus carries injected violations), got $rc" >&2
            cat corpus-report.json >&2
            exit 1
          fi
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, sys

          EXPECTED = {
              "repos_examined": 1, "issues_examined": 35,
              "open_examined": 9, "closed_examined": 26, "comments_examined": 3,
              "violations_detected": 19, "clean_accepted": 16,
              "exempt_pre_cutoff": 2, "exempt_not_planned": 1, "exempt_code": 4,
              "ok_github_linked": 2, "ok_syntax_valid": 5,
          }
          counts = json.load(open("corpus-report.json", encoding="utf-8"))["counts"]
          bad = {k: (v, counts.get(k)) for k, v in EXPECTED.items() if counts.get(k) != v}

          print("# weekly-loop gate — corpus replay")
          print()
          print("| metric | expected | observed |")
          print("|---|---:|---:|")
          for key, want in EXPECTED.items():
              print(f"| {key} | {want} | {counts.get(key)} |")
          print()
          if bad:
              print(f"**MISMATCH**: {bad}")
              print("The gate no longer reproduces the corpus. Either a bypass reopened "
                    "or the corpus changed without updating the expectations.",
                    file=sys.stderr)
              raise SystemExit(1)
          print("19 injected violations detected · 16 expected-clean cases accepted.")
          PY

      - name: weekly-loop gate — bypass must be refused under CI
        env:
          CI: "true"
        run: |
          set +e
          python scripts/weekly-harness/check.py \
            --cycle weekly-2026-07-27 \
            --repo jayleekr/hypeproof-corpus \
            --issues-json tests/weekly_loop/fixtures/evidence_corpus.json \
            --skip-evidence-gate >/dev/null 2>bypass.err
          rc=$?
          set -e
          if [ "$rc" != "2" ]; then
            echo "--skip-evidence-gate should exit 2 under CI=true, got $rc" >&2
            exit 1
          fi
          grep -q -- "--skip-evidence-gate is refused" bypass.err
