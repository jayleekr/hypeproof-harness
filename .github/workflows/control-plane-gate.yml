name: control-plane gate

# Enforces policy/control-plane.yaml: a PR that touches control-plane paths
# (governance engine, policy, security scanner, workflows, agent contracts) must
# be approved by a human maintainer who is not the author/last-pusher, and must
# not be approved or last-pushed by an automation actor.
#
# This job is intentionally SEPARATE from test.yml so its status-check context
# ("control-plane (human gate)") is isolated and unambiguous. To make it
# blocking, a human adds that context to branch protection AFTER it first runs
# green (see the M004 human-run command list). Do not require it before then —
# requiring a context no run has produced would lock merge (the exact failure
# mode this whole change exists to prevent).
#
# POISONED-PIPELINE DEFENCE (verifier finding): a PR could neuter the checker
# (make check_control_plane.py `return 0`) or shrink control-plane.yaml, and —
# because pull_request runs the PR HEAD's code — pass its own gate. So the
# "Restore trusted checker" step below runs the BASE-ref (trusted) copies of the
# script AND the policy, while the changed-file LIST comes from `git diff`
# (commit objects, not the working tree) which the PR cannot forge. This closes
# the SCRIPT/POLICY vector.
#   RESIDUAL (cannot be closed in-workflow, needs the human switches): a PR can
#   also edit THIS workflow file, since pull_request uses the head's workflow.
#   Renaming/removing the job makes the required context "control-plane
#   (human gate)" never report -> branch protection blocks merge (missing
#   required check). Neutering the job's steps while keeping its name is caught
#   only by CODEOWNERS(.github/workflows -> maintainers) + required review. Hence
#   ordering: merge this -> confirm green -> enable required check AND
#   require_code_owner_reviews together. Until both are on, the gate reports but
#   does not enforce.
# pull_request_target is deliberately NOT used: it would grant a write-capable
# token to a workflow triggered by untrusted PRs. This job only needs read; the
# base-ref checkout gives trust without that risk.

on:
  pull_request:
    branches: [main]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read

jobs:
  gate:
    name: control-plane (human gate)
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --quiet pyyaml

      - name: Restore trusted (base-ref) checker and policy
        run: |
          set -e
          git fetch origin "$BASE_REF" --depth=1
          for f in scripts/repo-governance/check_control_plane.py policy/control-plane.yaml; do
            if git cat-file -e "origin/${BASE_REF}:$f" 2>/dev/null; then
              git checkout "origin/${BASE_REF}" -- "$f"
              echo "restored trusted $f from origin/${BASE_REF}"
            else
              echo "::warning::$f is absent in base ($BASE_REF) — using the PR-head copy (bootstrap PR that introduces the gate). Base-ref protection is active from the next PR onward."
            fi
          done

      - name: Detect control-plane changes
        run: |
          set -e
          # File LIST is from commit objects (trusted); the CHECKER + POLICY were
          # restored to base above so a poisoned PR-head copy cannot self-pass.
          git diff --name-only "origin/${BASE_REF}...HEAD" > changed.txt
          if python scripts/repo-governance/check_control_plane.py --changed-files changed.txt; then
            echo "CONTROL_PLANE=0" >> "$GITHUB_ENV"
          else
            echo "CONTROL_PLANE=1" >> "$GITHUB_ENV"
          fi

      - name: Enforce human approval gate
        if: env.CONTROL_PLANE == '1'
        run: python scripts/repo-governance/check_control_plane.py --pr "$PR_NUMBER"
