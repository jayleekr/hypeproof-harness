name: repo-governance live audit

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: live repo governance drift audit
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.HYPEPROOF_GOVERNANCE_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install policy deps
        run: python -m pip install --quiet pyyaml

      # Without a token that can see admin-visible repo fields, `gh api repos/X`
      # still succeeds on public repos but omits allow_auto_merge and friends.
      # audit.py then reads them as None and reports drift on every one — 42
      # phantom findings in the 2026-07-22 run — while the genuinely drifted
      # settings it cannot reach stay invisible. Loud about the wrong things and
      # silent about the real ones is worse than failing, so check first and say
      # which of the two is happening.
      - name: Preflight — policy repos readable at admin visibility
        run: |
          set -eo pipefail
          python - <<'PY' > preflight-repos.txt
          import yaml
          policy = yaml.safe_load(open("policy/repos.yaml", encoding="utf-8"))
          for repo in policy.get("repositories", []):
              print(f"{repo['owner']}/{repo['name']}")
          PY
          total=0; unreachable=""; shallow=""
          while read -r full; do
            [ -n "$full" ] || continue
            total=$((total + 1))
            if ! body=$(gh api "repos/$full" 2>/dev/null); then
              unreachable="$unreachable $full"
            elif ! printf '%s' "$body" | grep -q '"allow_auto_merge"'; then
              shallow="$shallow $full"
            fi
          done < preflight-repos.txt
          # A repo that is readable but hides allow_auto_merge cannot be drift —
          # GitHub always shows that field to an admin-scoped token on a repo we
          # own. It means the token is too weak, full stop.
          #
          # A single unreachable repo IS drift (renamed, deleted, transferred)
          # and audit.py already reports it as github/critical. Only treat
          # unreachability as a credential problem when EVERY repo is blind,
          # which no amount of real drift produces at once.
          reachable=$((total - $(printf '%s' "$unreachable" | wc -w)))
          if [ -n "$shallow" ] || [ "$reachable" -eq 0 ]; then
            echo "::error::repo-governance audit cannot see the repos it audits" >&2
            [ -n "$shallow" ] && echo "readable but admin fields hidden:$shallow" >&2
            [ "$reachable" -eq 0 ] && echo "every policy repo unreachable:$unreachable" >&2
            echo "" >&2
            echo "This is a CREDENTIAL problem, not governance drift. Set the" >&2
            echo "HYPEPROOF_GOVERNANCE_TOKEN repository secret to a token with admin" >&2
            echo "read access to every repo in policy/repos.yaml. Until then any" >&2
            echo "findings this job produces are phantoms and the real drift is hidden." >&2
            exit 2
          fi
          if [ -n "$unreachable" ]; then
            echo "note: unreachable, will be reported as drift by audit.py:$unreachable"
          fi
          echo "$reachable/$total policy repos readable at admin visibility"

      # No `set +e … exit 0`: this job used to discard audit.py's exit code and
      # report success while its own artifact said `status: drift`. The status
      # is recorded here so the summary can still be written, and enforced in
      # the final step.
      - name: Run live audit
        id: audit
        run: |
          set +e
          python scripts/repo-governance/audit.py --all --json > repo-governance-audit.json
          status=$?
          set -e
          echo "$status" > repo-governance-audit.exitcode
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "audit.py exited $status"

      - name: Write summary
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os

          from collections import Counter

          if not os.path.exists("repo-governance-audit.json"):
              # preflight failed before the audit ran; it has already said why
              print("# Repo Governance Live Audit")
              print()
              print("Not run — preflight failed. See the job log.")
              raise SystemExit
          with open("repo-governance-audit.json", encoding="utf-8") as fh:
              data = json.load(fh)
          findings = data.get("findings", [])
          print("# Repo Governance Live Audit")
          print()
          print(f"Status: `{data.get('status')}`")
          print(f"Findings: `{len(findings)}`")
          print()
          if not findings:
              print("No drift found.")
              raise SystemExit

          by_severity = Counter(item.get("severity", "unknown") for item in findings)
          by_module = Counter(item.get("module", "unknown") for item in findings)
          print("## Severity")
          print()
          for key, count in sorted(by_severity.items()):
              print(f"- `{key}`: {count}")
          print()
          print("## Module")
          print()
          for key, count in sorted(by_module.items()):
              print(f"- `{key}`: {count}")
          print()
          print("## Findings")
          print()
          print("| Repo | Severity | Module | Field | Expected | Actual |")
          print("|---|---|---|---|---|---|")
          for item in findings:
              print(
                  "| {repo} | {severity} | {module} | {field} | `{expected}` | `{actual}` |".format(
                      repo=item.get("repo", ""),
                      severity=item.get("severity", ""),
                      module=item.get("module", ""),
                      field=item.get("field", ""),
                      expected=json.dumps(item.get("expected"), ensure_ascii=False),
                      actual=json.dumps(item.get("actual"), ensure_ascii=False),
                  )
              )
          PY

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repo-governance-audit
          if-no-files-found: ignore
          path: |
            repo-governance-audit.json
            repo-governance-audit.exitcode

      # The step that turns a recorded status into a failed job. Splitting it
      # out keeps the report above intact on a red run — the report is what a
      # human acts on, and it must survive the failure that summons them.
      - name: Enforce
        if: always()
        env:
          STATUS: ${{ steps.audit.outputs.status }}
        run: |
          if [ -z "$STATUS" ]; then
            echo "audit did not run (preflight failed) — see above" >&2
            exit 0
          fi
          case "$STATUS" in
            0) echo "no governance drift" ;;
            2|3) echo "::error::repo governance drift — see the job summary" >&2; exit 1 ;;
            4) echo "::error::policy/repos.yaml is invalid — this is a policy error, not drift" >&2; exit 1 ;;
            *) echo "::error::audit.py exited $STATUS (unexpected)" >&2; exit 1 ;;
          esac

  weekly-loop-gate:
    # The weekly-loop rules (Owner/ETA on open issues, evidence on closed ones)
    # are organizational facts about GitHub issues, so they can only be enforced
    # where live issues can be read — not at PR time. This audit is that
    # enforcement point; the PR-time counterpart in test.yml enforces the gate
    # code itself against a fixed adversarial corpus.
    name: weekly-loop owner/ETA + evidence gate (live)
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.HYPEPROOF_GOVERNANCE_TOKEN || github.token }}
      # Marks this as an enforcement path: check.py refuses --skip-evidence-gate
      # and treats "examined nothing" as a failure rather than a pass.
      HYPEPROOF_ENFORCE: "true"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # This audit reads issues in three OTHER repos, which the per-repo
      # GITHUB_TOKEN cannot do. Without a cross-repo token every `gh issue
      # list` 404s and the gate fails closed with a GraphQL error that reads
      # like a bug. Say what is actually wrong, once, before the gate runs.
      - name: Preflight — cross-repo issue read access
        run: |
          set -e
          missing=""
          for repo in jayleekr/hypeprooflab jayleekr/hypeproof-studio jayleekr/sediment; do
            if ! gh issue list --repo "$repo" --limit 1 --json number >/dev/null 2>&1; then
              missing="$missing $repo"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::cannot read issues in:$missing" >&2
            echo "The weekly-loop gate audits issues across the product repos, which the" >&2
            echo "per-repo GITHUB_TOKEN cannot see. Set the HYPEPROOF_GOVERNANCE_TOKEN" >&2
            echo "repository secret to a token with read access to those repos." >&2
            echo "Failing closed: an audit that cannot see the issues has not passed them." >&2
            exit 2
          fi
          echo "issue read access confirmed for all three product repos"

      - name: Resolve the cycles under audit
        id: cycles
        run: |
          python - >> "$GITHUB_OUTPUT" <<'PY'
          import datetime as dt

          # Cycle labels are named for the Monday meeting they feed. Audit the
          # upcoming cycle (open work) and the one before it (closed work, where
          # the evidence requirement actually bites).
          kst = dt.timezone(dt.timedelta(hours=9))
          today = dt.datetime.now(kst).date()
          upcoming = today + dt.timedelta(days=(0 - today.weekday()) % 7)
          previous = upcoming - dt.timedelta(days=7)
          print(f"labels=weekly-{previous.isoformat()} weekly-{upcoming.isoformat()}")
          PY

      - name: Run the gate against live issues
        env:
          LABELS: ${{ steps.cycles.outputs.labels }}
        run: |
          set -eo pipefail
          for label in $LABELS; do
            set +e
            # --min-issues 0 per label: a cycle that has not been filed yet is
            # legitimately empty. The aggregate non-vacuity check below is what
            # refuses to call an empty audit a pass.
            python scripts/weekly-harness/check.py \
              --cycle "$label" --min-issues 0 --json > "weekly-gate-$label.json"
            rc=$?
            set -e
            if [ "$rc" = "2" ]; then
              echo "checker errored for $label (config / gh / truncation)" >&2
              exit 2
            fi
          done

      - name: Write violation report
        run: |
          set -eo pipefail
          python - <<'PY' | tee weekly-gate-summary.md >> "$GITHUB_STEP_SUMMARY"
          import glob, json

          reports = [json.load(open(p, encoding="utf-8")) for p in sorted(glob.glob("weekly-gate-*.json"))]
          total = {}
          for report in reports:
              for key, value in report["counts"].items():
                  total[key] = total.get(key, 0) + value

          print("# weekly-loop gate — live audit")
          print()
          print(f"Cutoff: `{reports[0]['cutoff'] if reports else 'n/a'}` "
                "(issues closed earlier are exempt, derived from `closedAt`)")
          print()
          print("## Coverage — non-vacuity")
          print()
          print("| metric | value |")
          print("|---|---:|")
          for key in ("repos_examined", "issues_examined", "open_examined",
                      "closed_examined", "comments_examined", "clean_accepted",
                      "violations_detected", "exempt_pre_cutoff",
                      "exempt_not_planned", "exempt_code", "ok_github_linked",
                      "ok_syntax_valid", "evidence_gate_skipped"):
              print(f"| {key} | {total.get(key, 0)} |")
          print()

          rows = [
              (report["cycle"], item)
              for report in reports
              for item in report["issues"]
              if item["status"] == "violation"
          ]
          print("## Violations")
          print()
          if not rows:
              print("None.")
          else:
              # Issue numbers and rule names only — no issue content is copied
              # into the summary, and nothing here edits an issue.
              print("| cycle | repo | issue | rule | reasons |")
              print("|---|---|---|---|---|")
              for cycle, item in rows:
                  link = f"[#{item['number']}]({item['url']})" if item["url"] else f"#{item['number']}"
                  print(f"| {cycle} | {item['repo']} | {link} | {item['rule']} | "
                        f"{len(item['violations'])} |")
          PY

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: weekly-loop-gate
          path: |
            weekly-gate-*.json
            weekly-gate-summary.md

      - name: Enforce
        run: |
          python - <<'PY'
          import glob, json, sys

          reports = [json.load(open(p, encoding="utf-8")) for p in sorted(glob.glob("weekly-gate-*.json"))]
          examined = sum(r["counts"]["issues_examined"] for r in reports)
          violations = sum(r["counts"]["violations_detected"] for r in reports)
          skipped = sum(r["counts"]["evidence_gate_skipped"] for r in reports)

          if not reports or examined == 0:
              sys.exit(f"examined {examined} issue(s) across {len(reports)} cycle(s) — "
                       "a control that examined nothing has not passed")
          if skipped:
              sys.exit(f"{skipped} closed issue(s) bypassed the evidence gate on an "
                       "enforcement path")
          print(f"examined {examined} issue(s); {violations} violation(s)")
          if violations:
              sys.exit("weekly-loop gate failed — see the job summary for the "
                       "issues that need an Owner/ETA or an Evidence ref")
          PY
